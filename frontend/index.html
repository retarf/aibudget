<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>aibudget</title>
    <script>
      // Apply the stored (or OS-preferred) color scheme before first paint so
      // dark-mode users do not see a light flash. Mirrors Mantine's
      // ColorSchemeScript; the key matches localStorageColorSchemeManager.
      (function () {
        try {
          var stored = localStorage.getItem("mantine-color-scheme-value");
          var scheme =
            stored ||
            (window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light");
          document.documentElement.setAttribute(
            "data-mantine-color-scheme",
            scheme,
          );
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
